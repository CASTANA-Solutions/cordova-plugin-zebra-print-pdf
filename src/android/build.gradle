repositories {
    mavenCentral()
}

dependencies {
    implementation files('libs/ZSDK_ANDROID_API.jar')
}

android {
    defaultConfig {
        minSdkVersion 24
    }
    packagingOptions {
        exclude 'META-INF/LICENSE.txt'
        exclude 'META-INF/NOTICE.txt'
        exclude 'META-INF/NOTICE'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/DEPENDENCIES'
    }
}
